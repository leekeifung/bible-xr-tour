<html lang="en">
  <head>
    <title>Daniel 2 - Statue Dream | XR Blocks Bible Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <script>
      window.litDisableBundleWarning = true;

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",

  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      const BIBLE_TEXT = `Daniel 2:1-49 (The Background, Dream, and Interpretation)

1 In the second year of his reign Nebuchadnezzar had many dreams. His mind was disturbed and he suffered from insomnia. 2 The king issued an order to summon the magicians, astrologers, sorcerers, and wise men in order to explain his dreams to him. So they came and awaited the king’s instructions. 
3 The king told them, “I have had a dream, and I am anxious to understand the dream.” 4 The wise men replied to the king: [What follows is in Aramaic] “O king, live forever! Tell your servants the dream, and we will disclose its interpretation.” 5 The king replied to the wise men, “My decision is firm. If you do not inform me of both the dream and its interpretation, you will be dismembered and your homes reduced to rubble! 6 But if you can disclose the dream and its interpretation, you will receive from me gifts, a reward, and considerable honor. So disclose to me the dream and its interpretation” 7 They again replied, “Let the king inform us of the dream; then we will disclose its interpretation.” 8 The king replied, “I know for sure that you are attempting to gain time, because you see that my decision is firm. 9 If you don’t inform me of the dream, there is only one thing that is going to happen to you. For you have agreed among yourselves to report to me something false and deceitful until such time as things might change. So tell me the dream, and I will have confidence that you can disclose its interpretation.” 
10 The wise men replied to the king, “There is no man on earth who is able to disclose the king’s secret, for no king, regardless of his position and power, has ever requested such a thing from any magician, astrologer, or wise man. 11 What the king is asking is too difficult, and no one exists who can disclose it to the king, except for the gods—but they don’t live among mortals!” 
12 Because of this the king got furiously angry and gave orders to destroy all the wise men of Babylon. 13 So a decree went out, and the wise men were about to be executed. They also sought Daniel and his friends so that they could be executed. 
14 Then Daniel spoke with prudent counsel to Arioch, who was in charge of the king’s executioners and who had gone out to execute the wise men of Babylon. 15 He inquired of Arioch the king’s deputy, “Why is the decree from the king so urgent?” Then Arioch informed Daniel about the matter. 16 So Daniel went in and requested the king to grant him time, that he might disclose the interpretation to the king. 17 Then Daniel went to his home and informed his friends Hananiah, Mishael, and Azariah of the matter. 18 He asked them to pray for mercy from the God of heaven concerning this mystery so that he and his friends would not be destroyed along with the rest of the wise men of Babylon. 19 Then in a night vision the mystery was revealed to Daniel. So Daniel praised the God of heaven, 20 saying; 
“Let the name of God be praised forever and ever, 
for wisdom and power belong to him. 
21 He changes times and seasons, 
deposing some kings 
and establishing others. 
He gives wisdom to the wise; 
he imparts knowledge to those with understanding; 
22 he reveals deep and hidden things. 
He knows what is in the darkness, 
and light resides with him. 
23 O God of my fathers, I acknowledge and glorify you, 
for you have bestowed wisdom and power on me. 
Now you have enabled me to understand what I requested from you. 
For you have enabled me to understand the king’s dilemma.” 
24 Then Daniel went in to see Arioch (whom the king had appointed to destroy the wise men of Babylon). He came and said to him, “Don’t destroy the wise men of Babylon! Escort me to the king, and I will disclose the interpretation to him” 
25 So Arioch quickly ushered Daniel into the king’s presence, saying to him, “I have found a man from the captives of Judah who can make known the interpretation to the king.” 26 The king then asked Daniel (whose name was also Belteshazzar), “Are you able to make known to me the dream that I saw, as well as its interpretation?” 27 Daniel replied to the king, “The mystery that the king is asking about is such that no wise men, astrologers, magicians, or diviners can possibly disclose it to the king. 28 However, there is a God in heaven who reveals mysteries, and he has made known to King Nebuchadnezzar what will happen in the times to come. The dream and the visions you had while lying on your bed are as follows: 
29 “As for you, O king, while you were in your bed your thoughts turned to future things. The revealer of mysteries has made known to you what will take place. 30 As for me, this mystery was revealed to me not because I possess more wisdom than any other living person, but so that the king may understand the interpretation and comprehend the thoughts of your mind. 
31 “You, O king, were watching as a great statue—one of impressive size and extraordinary brightness—was standing before you. Its appearance caused alarm. 32 As for that statue, its head was of fine gold, its chest and arms were of silver, its belly and thighs were of bronze. 33 Its legs were of iron; its feet were partly of iron and partly of clay. 34 You were watching as a stone was cut out, but not by human hands. It struck the statue on its iron and clay feet, breaking them in pieces. 35 Then the iron, clay, bronze, silver, and gold were broken in pieces without distinction and became like chaff from the summer threshing floors that the wind carries away. Not a trace of them could be found. But the stone that struck the statue became a large mountain that filled the entire earth. 36 This was the dream. Now we will set forth before the king its interpretation. 

Daniel Interprets Nebuchadnezzar’s Dream

37 “You, O king, are the king of kings. The God of heaven has granted you sovereignty, power, strength, and honor. 38 Wherever human beings, wild animals, and birds of the sky live—he has given them into your power. He has given you authority over them all. You are the head of gold. 39 Now after you another kingdom will arise, one inferior to yours. Then a third kingdom, one of bronze, will rule in all the earth. 40 Then there will be a fourth kingdom, one strong like iron. Just like iron breaks in pieces and shatters everything, and as iron breaks in pieces all of these metals, so it will break in pieces and crush the others. 41 In that you were seeing feet and toes partly of wet clay and partly of iron, so this will be a divided kingdom. Some of the strength of iron will be in it, for you saw iron mixed with wet clay. 42 In that the toes of the feet were partly of iron and partly of clay, the latter stages of this kingdom will be partly strong and partly fragile. 43 And in that you saw iron mixed with wet clay, so people will be mixed with one another without adhering to one another, just as iron does not mix with clay. 44 In the days of those kings the God of heaven will raise up an everlasting kingdom that will not be destroyed and a kingdom that will not be left to another people. It will break in pieces and bring about the demise of all these kingdoms. But it will stand forever. 45 You saw that a stone was cut from a mountain, but not by human hands; it smashed the iron, bronze, clay, silver, and gold into pieces. The great God has made known to the king what will occur in the future. The dream is certain, and its interpretation is reliable.” 
46 Then King Nebuchadnezzar bowed down with his face to the ground and paid homage to Daniel. He gave orders to offer sacrifice and incense to him. 47 The king replied to Daniel, “Certainly your God is a God of gods and Lord of kings and revealer of mysteries, for you were able to reveal this mystery!” 48 Then the king elevated Daniel to high position and bestowed on him many marvelous gifts. He granted him authority over the entire province of Babylon and made him the main prefect over all the wise men of Babylon. 49 And at Daniel’s request, the king appointed Shadrach, Meshach, and Abednego over the administration of the province of Babylon. Daniel himself served in the king’s court.`;

      /**
       * Bible Tour Script representing Daniel 2
       */
      class BibleTourScript extends xb.Script {
        constructor() {
          super();
          this.animState = 0; // 0: Idle, 1: Smashing, 2: Mountain, 3: Resetting
          this.stoneInitialPos = new THREE.Vector3(1.5, 2.5, -1.0);
          this.stoneTargetPos = new THREE.Vector3(0.5, 0.2, -2.0); // Aiming at feet
          this.statueInitialScale = new THREE.Vector3(1, 1, 1);
        }

        init() {
          // 1. Setup Lighting
          this.add(new THREE.HemisphereLight(0xffeedd, 0x444444, 1.5)); // Warm ambient light
          const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5); // Warm directional light simulating torch/sunlight
          dirLight.position.set(2, 5, 2);
          this.add(dirLight);

          // 2. Setup Throne Room Environment
          this.createRoom();

          // 3. Setup Characters (Nebuchadnezzar & Daniel)
          this.createCharacters();

          // 4. Setup Vision Statue
          this.createStatue();

          // 5. Setup Stone
          this.createStone();

          // 6. Setup Spatial UI
          this.createUI();
        }

        createRoom() {
          this.roomGroup = new THREE.Group();

          // Materials
          const floorMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 });
          const wallMat = new THREE.MeshStandardMaterial({ color: 0x998877, roughness: 0.9 }); // Sandstone walls
          const pillarMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8 }); // Marble pillars

          // Floor
          const floor = new THREE.Mesh(new THREE.BoxGeometry(12, 0.1, 12), floorMat);
          floor.position.y = -0.05; // Slightly below 0 so items rest on 0

          // Back Wall
          const backWall = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 0.5), wallMat);
          backWall.position.set(0, 3, -4.5);

          // Pillars
          const pillarGeo = new THREE.CylinderGeometry(0.3, 0.3, 6, 32);
          
          const p1 = new THREE.Mesh(pillarGeo, pillarMat);
          p1.position.set(-3, 3, -3);
          const p2 = new THREE.Mesh(pillarGeo, pillarMat);
          p2.position.set(3, 3, -3);
          const p3 = new THREE.Mesh(pillarGeo, pillarMat);
          p3.position.set(-3, 3, 0);
          const p4 = new THREE.Mesh(pillarGeo, pillarMat);
          p4.position.set(3, 3, 0);

          this.roomGroup.add(floor, backWall, p1, p2, p3, p4);
          this.add(this.roomGroup);
        }

        createCharacters() {
          this.charactersGroup = new THREE.Group();

          // Reusable Materials
          const skinMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.6 });
          const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.2 });

          // -----------------------------------------
          // King Nebuchadnezzar (Seated on Throne)
          // -----------------------------------------
          
          // The Throne
          const throneMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.6, roughness: 0.4 });
          const throneSeat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.8), throneMat);
          throneSeat.position.set(0, 0.25, -4.0);
          const throneBack = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.15), throneMat);
          throneBack.position.set(0, 1.1, -4.325);
          this.charactersGroup.add(throneSeat, throneBack);

          const kingGroup = new THREE.Group();
          
          // King Body (Royal Purple Robe)
          const kingRobeMat = new THREE.MeshStandardMaterial({ color: 0x4B0082, roughness: 0.8 });
          const kBody = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.8, 16), kingRobeMat);
          kBody.position.y = 0.4;
          
          // King Head
          const kHead = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), skinMat);
          kHead.position.y = 0.9;
          
          // King Crown
          const kCrown = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.15, 16), goldMat);
          kCrown.position.y = 1.05;
          
          // King Beard
          const beardMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
          const kBeard = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.15), beardMat);
          kBeard.position.set(0, 0.75, 0.1);

          kingGroup.add(kBody, kHead, kCrown, kBeard);
          // Position King sitting on the throne (elevated slightly)
          kingGroup.position.set(0, 0.5, -3.9); 
          this.charactersGroup.add(kingGroup);


          // -----------------------------------------
          // Daniel (16-year-old youth standing)
          // -----------------------------------------
          const danielGroup = new THREE.Group();

          // Daniel Body (Simple Tunic)
          const danielTunicMat = new THREE.MeshStandardMaterial({ color: 0x8FBC8F, roughness: 0.9 });
          const dBody = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 1.1, 16), danielTunicMat);
          dBody.position.y = 0.55;

          // Daniel Head (No beard, smaller features to look young)
          const dHead = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), skinMat);
          dHead.position.y = 1.16;

          // Daniel Hair
          const dHair = new THREE.Mesh(new THREE.SphereGeometry(0.125, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2), beardMat);
          dHair.position.y = 1.16;

          // Daniel Arm (Pointing at the statue)
          const dArmGroup = new THREE.Group();
          dArmGroup.position.set(0.18, 0.9, 0); // Shoulder joint
          const dArm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.5, 16), danielTunicMat);
          dArm.position.set(0, 0, 0.25); // Extend forward
          dArm.rotation.x = Math.PI / 2; // Point forward
          dArmGroup.add(dArm);
          // Angle arm slightly towards the center statue
          dArmGroup.rotation.y = -Math.PI / 6;

          danielGroup.add(dBody, dHead, dHair, dArmGroup);
          
          // Position Daniel to the left, looking towards the King and gesturing to the statue
          danielGroup.position.set(-1.5, 0, -2.5);
          danielGroup.lookAt(0, 1.0, -4.0); // Looking at the King

          this.charactersGroup.add(danielGroup);

          this.add(this.charactersGroup);
        }

        createStatue() {
          this.statueGroup = new THREE.Group();
          
          // Enhanced Materials
          const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 1.0, roughness: 0.15 });
          const silverMat = new THREE.MeshStandardMaterial({ color: 0xE0E0E0, metalness: 0.9, roughness: 0.2 });
          const bronzeMat = new THREE.MeshStandardMaterial({ color: 0xCD7F32, metalness: 0.8, roughness: 0.3 });
          const ironMat = new THREE.MeshStandardMaterial({ color: 0x434B4D, metalness: 0.7, roughness: 0.4 });
          const clayIronMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, metalness: 0.3, roughness: 0.8 }); // Mixed earthy tone

          // --- Head & Neck (Gold) ---
          const headGroup = new THREE.Group();
          headGroup.position.y = 1.7;
          
          const head = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), goldMat);
          head.position.y = 0.15;
          
          const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.1, 16), goldMat);
          
          const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, 0.08, 16), goldMat);
          crown.position.y = 0.24;
          
          headGroup.add(head, neck, crown);
          this.statueGroup.add(headGroup);

          // --- Chest & Arms (Silver) ---
          const chestGroup = new THREE.Group();
          chestGroup.position.y = 1.35;
          
          // Torso upper
          const chest = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 0.4, 32), silverMat);
          chest.scale.set(1, 1, 0.6); // Flatten chest depth
          chestGroup.add(chest);

          // Arms
          const armGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.35, 16);
          const jointGeo = new THREE.SphereGeometry(0.07, 16, 16);
          
          const leftArm = new THREE.Group();
          leftArm.position.set(-0.3, 0.1, 0);
          leftArm.rotation.z = Math.PI / 8;
          const lShoulder = new THREE.Mesh(jointGeo, silverMat);
          const lBicep = new THREE.Mesh(armGeo, silverMat);
          lBicep.position.y = -0.175;
          leftArm.add(lShoulder, lBicep);
          
          const rightArm = new THREE.Group();
          rightArm.position.set(0.3, 0.1, 0);
          rightArm.rotation.z = -Math.PI / 8;
          const rShoulder = new THREE.Mesh(jointGeo, silverMat);
          const rBicep = new THREE.Mesh(armGeo, silverMat);
          rBicep.position.y = -0.175;
          rightArm.add(rShoulder, rBicep);

          chestGroup.add(leftArm, rightArm);
          this.statueGroup.add(chestGroup);

          // --- Belly & Thighs (Bronze) ---
          const bellyGroup = new THREE.Group();
          bellyGroup.position.y = 0.95;
          
          // Lower torso / Skirt
          const belly = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.4, 32), bronzeMat);
          belly.scale.set(1, 1, 0.7);
          bellyGroup.add(belly);

          // Thighs
          const thighGeo = new THREE.CylinderGeometry(0.08, 0.06, 0.4, 16);
          const lThigh = new THREE.Mesh(thighGeo, bronzeMat);
          lThigh.position.set(-0.12, -0.3, 0);
          const rThigh = new THREE.Mesh(thighGeo, bronzeMat);
          rThigh.position.set(0.12, -0.3, 0);
          bellyGroup.add(lThigh, rThigh);
          
          this.statueGroup.add(bellyGroup);

          // --- Legs (Iron) ---
          const legGroup = new THREE.Group();
          legGroup.position.y = 0.45;
          
          const calfGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.4, 16);
          const kneeGeo = new THREE.SphereGeometry(0.065, 16, 16);

          const lKnee = new THREE.Mesh(kneeGeo, ironMat);
          lKnee.position.set(-0.12, 0.2, 0);
          const lCalf = new THREE.Mesh(calfGeo, ironMat);
          lCalf.position.set(-0.12, 0, 0);

          const rKnee = new THREE.Mesh(kneeGeo, ironMat);
          rKnee.position.set(0.12, 0.2, 0);
          const rCalf = new THREE.Mesh(calfGeo, ironMat);
          rCalf.position.set(0.12, 0, 0);

          legGroup.add(lKnee, lCalf, rKnee, rCalf);
          this.statueGroup.add(legGroup);

          // --- Feet (Iron and Clay) ---
          const feetGroup = new THREE.Group();
          feetGroup.position.y = 0.1;
          
          const footGeo = new THREE.BoxGeometry(0.1, 0.1, 0.2);
          footGeo.translate(0, -0.05, 0.05); // Shift origin to the heel

          const lFoot = new THREE.Mesh(footGeo, clayIronMat);
          lFoot.position.set(-0.12, 0.1, -0.05);
          const rFoot = new THREE.Mesh(footGeo, clayIronMat);
          rFoot.position.set(0.12, 0.1, -0.05);

          feetGroup.add(lFoot, rFoot);
          this.statueGroup.add(feetGroup);

          // Position Statue as a vision in the center of the room, facing the king slightly
          this.statueGroup.position.set(0.5, 0, -2.0); 
          this.add(this.statueGroup);
        }

        createStone() {
          const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 1.0 });
          this.stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15, 1), stoneMat);
          this.stone.position.copy(this.stoneInitialPos);
          this.add(this.stone);
        }

        createUI() {
          // Spatial Panel on the left side
          const panel = new xb.SpatialPanel({
            width: 1.8,
            height: 1.6, // Taller panel to fit more text comfortably
            backgroundColor: '#1a1a1ae6',
            useDefaultPosition: false
          });
          // Positioned closer to the user to avoid clipping into the throne room
          panel.position.set(-1.3, 1.4, -1.2);
          panel.rotation.y = Math.PI / 6; 
          this.add(panel);

          const grid = panel.addGrid();

          // Text Area (Scrollable to accommodate interpretation)
          const textRow = grid.addRow({ weight: 0.85 });
          const textView = new xb.ScrollingTroikaTextView({
            text: BIBLE_TEXT,
            fontSize: 0.04, // Slightly smaller to fit the massive text block
            fontColor: '#ffffff',
            textAlign: 'left'
          });
          textRow.add(textView);

          // Controls Area
          const ctrlRow = grid.addRow({ weight: 0.15 });
          
          const smashBtn = ctrlRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Trigger Prophecy',
            fontSize: 0.08,
            backgroundColor: '#8B0000',
            fontColor: '#ffffff'
          });
          
          const resetBtn = ctrlRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Reset Vision',
            fontSize: 0.08,
            backgroundColor: '#4285F4',
            fontColor: '#ffffff'
          });
          
          // Back Button to return to landing page
          const backBtnRow = grid.addRow({ weight: 0.1 });
          const backBtn = backBtnRow.addCol({ weight: 1.0 }).addTextButton({
            text: 'Back to Menu',
            fontSize: 0.06,
            backgroundColor: '#333333',
            fontColor: '#ffffff'
          });

          // Bind Events
          smashBtn.onTriggered = () => {
            if (this.animState === 0) this.animState = 1;
          };

          resetBtn.onTriggered = () => {
            this.animState = 3;
          };
          
          backBtn.onTriggered = () => {
             window.location.href = 'index.html';
          };
        }

        update() {
          const dt = xb.getDeltaTime();
          const speed = 2.0;

          if (this.animState === 1) {
            // Stone flying towards feet
            this.stone.position.lerp(this.stoneTargetPos, speed * dt);
            this.stone.rotation.x += 5 * dt;
            this.stone.rotation.y += 5 * dt;

            // Check distance to feet
            if (this.stone.position.distanceTo(this.stoneTargetPos) < 0.1) {
              this.animState = 2; // Impact! Transition to Mountain state
            }
          } 
          else if (this.animState === 2) {
            // Statue crumbles to dust (shrinks)
            if (this.statueGroup.scale.x > 0.01) {
              this.statueGroup.scale.lerp(new THREE.Vector3(0, 0, 0), speed * 3 * dt);
            } else {
              this.statueGroup.visible = false;
            }

            // Stone grows into a mountain
            const mountainScale = new THREE.Vector3(15, 15, 15);
            this.stone.scale.lerp(mountainScale, speed * 0.5 * dt);
            
            // Move stone to center to fill earth
            const mountainPos = new THREE.Vector3(0, 0, -3.0);
            this.stone.position.lerp(mountainPos, speed * 0.5 * dt);
          }
          else if (this.animState === 3) {
            // Fast reset
            this.statueGroup.visible = true;
            this.statueGroup.scale.lerp(this.statueInitialScale, speed * 4 * dt);
            this.stone.scale.lerp(new THREE.Vector3(1, 1, 1), speed * 4 * dt);
            this.stone.position.lerp(this.stoneInitialPos, speed * 4 * dt);
            
            if (this.statueGroup.scale.x > 0.99 && this.stone.position.distanceTo(this.stoneInitialPos) < 0.1) {
              this.animState = 0; // Ready again
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        xb.add(new BibleTourScript());
        xb.init(options);
      });

    </script>
  </body>
</html>
